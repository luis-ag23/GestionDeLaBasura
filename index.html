<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Document</title>
</head>
<body>

  <header>
    <h1>Sistema de Gestión de Basura</h1>
    <p>Registro y seguimiento de reportes de residuos</p>
  </header>
  <main>
    <section>
      <h2>Reportes</h2>
      </section>

    <hr>
    <section>
      <h2>Gestión de Usuarios</h2>
      
      <h3>Nuevo Usuario</h3>
      <form id="form-usuario">
        <div>
          <label for="nombre">Nombre Completo:</label><br>
          <input type="text" id="nombre" name="nombre" required placeholder="Ej. Ana Lidia">
        </div><br>

        <div>
          <label for="correo">Correo:</label><br>
          <input type="email" id="correo" name="correo" required placeholder="ana@ejemplo.com">
        </div><br>

        <div>
          <label for="password">Contraseña:</label><br>
          <input type="password" id="password" name="password" required>
        </div><br>

        <div>
          <label for="rol">Rol:</label><br>
          <select id="rol" name="rol">
            <option value="usuario">Usuario Estándar</option>
            <option value="admin">Administrador</option>
          </select>
        </div><br>
        
        <button type="submit">Guardar Usuario</button>
      </form>
    </section>

    <section>
      <h3>Lista de Usuarios</h3>
      <table border="1" cellpadding="8">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Correo</th>
            <th>Rol</th>
            <th>Fecha</th>
          </tr>
        </thead>
        <tbody id="usuarios-tbody">
          </tbody>
      </table>
    </section>
  </main>checkout 
  <footer>
    <p>© 2026 Sistema de Gestión de Basura</p>
  </footer>
  
  <script type="module" src="./src/index.js"></script>
</body>
</html>
