<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro · GestiónBasura</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

    <div class="auth-layout">
        <div class="auth-card">
            <div class="auth-card__header">
                <span class="auth-card__icon">🗑️</span>
                <h1 class="auth-card__title">Crear Cuenta</h1>
                <p class="auth-card__subtitle">Únete al sistema de GestiónBasura</p>
            </div>

            <form id="form-registro" class="form">
                <div class="form__group">
                    <label for="nombre" class="form__label">Nombre Completo</label>
                    <input type="text" id="nombre" class="form__input" placeholder="Ej. Ana Lidia" required>
                </div>

                <div class="form__group">
                    <label for="correo" class="form__label">Correo Electrónico</label>
                    <input type="email" id="correo" class="form__input" placeholder="vecino@cochabamba.bo" required>
                </div>

                <div class="form__group">
                    <label for="password" class="form__label">Contraseña</label>
                    <input type="password" id="password" class="form__input" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn--submit">Registrarme</button>
            </form>

            <div class="auth-card__footer">
                <a href="../home/home.html" class="auth-card__link">← Volver al inicio</a>
            </div>
        </div>
    </div>
<script type="module" src="../src/registro-entry.js"></script>
    </body>
</html>
